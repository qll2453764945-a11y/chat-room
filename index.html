<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高级聊天室</title>
<style>
body{margin:0;background:#e5e5e5;font-family:-apple-system,BlinkMacSystemFont}
#app{width:100%;max-width:900px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:#f7f7f7;border-left:1px solid #ddd;border-right:1px solid #ddd}

#topBar{background:#ffffff;padding:14px;text-align:center;font-weight:600;border-bottom:1px solid #ddd;font-size:16px}

#nameBox{display:flex;padding:10px;background:#fafafa;border-bottom:1px solid #eee}
#nameBox input{flex:1;padding:8px;border:1px solid #ddd;border-radius:6px}
#nameBox button{margin-left:10px;background:#07c160;color:#fff;border:none;padding:8px 16px;border-radius:6px}

#messages{flex:1;overflow-y:auto;padding:20px}

.msgRow{display:flex;margin:12px 0}
.msgRow.me{justify-content:flex-end}

.msgContent{max-width:60%;display:flex;flex-direction:column}
.msgRow.me .msgContent{align-items:flex-end}

.name{font-size:11px;color:#999;margin-bottom:4px}

.bubble{
padding:10px 14px;
border-radius:10px;
font-size:14px;
line-height:1.6;
word-break:break-word;
}

.other .bubble{background:#ffffff}
.me .bubble{background:#95ec69}

#inputBox{display:flex;padding:12px;background:#ffffff;border-top:1px solid #ddd}
#inputBox input{flex:1;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:14px}
#inputBox button{margin-left:10px;background:#07c160;color:#fff;border:none;padding:12px 20px;border-radius:8px}

</style>
</head>
<body>
<div id="app">

<div id="topBar">聊天室</div>

<div id="nameBox">
<input id="nameInput" placeholder="输入你的名字" />
<button onclick="saveName()">确认</button>
</div>

<div id="messages"></div>

<div id="inputBox">
<input id="msgInput" placeholder="输入消息...（回车发送）" />
<button onclick="sendMsg()">发送</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB-skHrH1xF0mHcbcFKoZlrXNeeioFCKSw",
  authDomain: "glasses-system.firebaseapp.com",
  projectId: "glasses-system",
  storageBucket: "glasses-system.firebasestorage.app",
  messagingSenderId: "254384078364",
  appId: "1:254384078364:web:668af7889edad0523a69d9",
  databaseURL: "https://glasses-system-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username = localStorage.getItem("chat_name") || "";

window.saveName = function(){
  const name = document.getElementById("nameInput").value.trim();
  if(!name){alert("请输入名字");return;}
  username = name;
  localStorage.setItem("chat_name", name);
  alert("已设置："+name);
};

const messagesRef = ref(db, "chatroom");

window.sendMsg = function(){
  if(!username){alert("请先输入名字");return;}
  const input = document.getElementById("msgInput");
  const text = input.value.trim();
  if(!text) return;

  push(messagesRef, {
    name: username,
    text: text,
    time: Date.now()
  });

  input.value = "";
};

// 回车发送
const inputBox = document.getElementById("msgInput");
inputBox.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    e.preventDefault();
    sendMsg();
  }
});

onChildAdded(messagesRef, (data) => {
  const msg = data.val();

  const row = document.createElement("div");
  row.className = "msgRow " + (msg.name === username ? "me" : "other");

  const content = document.createElement("div");
  content.className = "msgContent";

  const nameDiv = document.createElement("div");
  nameDiv.className = "name";
  nameDiv.textContent = msg.name;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = msg.text;

  content.appendChild(nameDiv);
  content.appendChild(bubble);

  row.appendChild(content);
  document.getElementById("messages").appendChild(row);

  const box = document.getElementById("messages");
  box.scrollTop = box.scrollHeight;
});
</script>
</body>
</html>
